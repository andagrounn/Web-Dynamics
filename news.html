<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time News — Services Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav scrolled" id="mainNav">
    <div class="nav__brand">
      <a href="index.html" style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;color:inherit">
        <div class="nav__icon"><i class="fa fa-layer-group"></i></div>
        <span class="nav__title">Services<span class="nav__title--accent">Dashboard</span></span>
      </a>
    </div>
    <ul class="nav__links">
      <li><a href="map.html"><i class="fa fa-map-location-dot"></i> Map</a></li>
      <li><a href="news.html" class="nav__active"><i class="fa fa-newspaper"></i> News</a></li>
      <li><a href="youtube.html"><i class="fa fa-play-circle"></i> Media</a></li>
      <li><a href="clock.html"><i class="fa fa-clock"></i> Clock</a></li>
    </ul>
    <div class="nav__hamburger" id="navHamburger"><span></span><span></span><span></span></div>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero" style="--page-clr:#22d3ee">
    <div class="page-hero__bg" style="--orb-clr:rgba(34,211,238,0.18)"></div>
    <div class="page-hero__content">
      <div class="section__tag" style="--tag-clr:#22d3ee">
        <i class="fa fa-newspaper"></i> Part 1 · Requirement 2
      </div>
      <h1 class="page-hero__title">Real-Time <span class="gradient-text--cyan">News Stream</span></h1>
      <p class="page-hero__sub">Search live articles from the New York Times with a loading spinner</p>
    </div>
  </div>

  <!-- NEWS SECTION -->
  <section class="section">
    <div class="section__inner">
      <div class="search-bar">
        <i class="fa fa-magnifying-glass search-bar__icon" style="color:#22d3ee"></i>
        <input type="text" id="newsSearchInput" class="search-bar__input"
          placeholder="e.g. Technology, Climate, Sports..." autocomplete="off" />
        <button id="newsSearchBtn" class="search-bar__btn" style="--btn-from:#0891b2;--btn-to:#22d3ee">
          <i class="fa fa-search"></i> Search
        </button>
      </div>

      <div id="newsSpinner" class="spinner-wrap hidden">
        <div class="spinner"></div>
        <span>Fetching articles…</span>
      </div>

      <div id="newsGrid" class="news-grid"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand"><i class="fa fa-layer-group"></i> <span>Services Dashboard</span></div>
      <p class="footer__copy">&copy; 2026 &mdash; NYTimes Article Search API</p>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="js/news.js"></script>
  <script>
    document.getElementById('navHamburger').addEventListener('click', function () {
      document.querySelector('.nav__links').classList.toggle('open');
      this.classList.toggle('active');
    });
  </script>
</body>
</html>
