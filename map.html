<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geospatial Intelligence — Services Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav scrolled" id="mainNav">
    <div class="nav__brand">
      <a href="index.html" style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;color:inherit">
        <div class="nav__icon"><i class="fa fa-layer-group"></i></div>
        <span class="nav__title">Services<span class="nav__title--accent">Dashboard</span></span>
      </a>
    </div>
    <ul class="nav__links">
      <li><a href="map.html" class="nav__active"><i class="fa fa-map-location-dot"></i> Map</a></li>
      <li><a href="news.html"><i class="fa fa-newspaper"></i> News</a></li>
      <li><a href="youtube.html"><i class="fa fa-play-circle"></i> Media</a></li>
      <li><a href="clock.html"><i class="fa fa-clock"></i> Clock</a></li>
    </ul>
    <div class="nav__hamburger" id="navHamburger"><span></span><span></span><span></span></div>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero" style="--page-clr:#818cf8">
    <div class="page-hero__bg"></div>
    <div class="page-hero__content">
      <div class="section__tag" style="--tag-clr:#818cf8">
        <i class="fa fa-map-location-dot"></i> Part 1 · Requirement 1
      </div>
      <h1 class="page-hero__title">Geospatial <span class="gradient-text">Intelligence</span></h1>
      <p class="page-hero__sub">Search any location to fly the map and drop a live marker</p>
    </div>
  </div>

  <!-- MAP SECTION -->
  <section class="section">
    <div class="section__inner">
      <div class="map-search-wrap">
        <div class="search-bar" id="mapSearchBar">
          <i class="fa fa-magnifying-glass search-bar__icon"></i>
          <input type="text" id="mapSearchInput" class="search-bar__input"
            placeholder="e.g. Kingston, Negril, Blue Mountains…" autocomplete="off" />
          <button id="mapSearchBtn" class="search-bar__btn">
            <i class="fa fa-location-crosshairs"></i> Search
          </button>
        </div>
        <ul class="map-suggestions hidden" id="mapSuggestions" role="listbox"></ul>
      </div>
      <div id="mapStatus" class="map-status" aria-live="polite"></div>
    </div>
    <div id="mapContainer"></div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand"><i class="fa fa-layer-group"></i> <span>Services Dashboard</span></div>
      <p class="footer__copy">&copy; 2026 &mdash; MapQuest API · Leaflet · OpenStreetMap</p>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="js/map.js"></script>
  <script>
    document.getElementById('navHamburger').addEventListener('click', function () {
      document.querySelector('.nav__links').classList.toggle('open');
      this.classList.toggle('active');
    });
  </script>
</body>
</html>
